# ============================================================
# mcp-stack docker-compose.yml
# Infrastructure-as-code for all MCP servers
# Host: LXC 106 (mcp-stack) on Proxmox, VLAN 11 (192.168.11.6)
# ============================================================

networks:
  mcp-net:
    driver: bridge

services:

  # ----------------------------------------------------------
  # m365-mcp  —  PnP CLI for Microsoft 365
  # Transport: stdio via SSH
  # ----------------------------------------------------------
  m365-mcp:
    build:
      context: ./services/m365-mcp
      dockerfile: Dockerfile
    container_name: m365-mcp
    restart: unless-stopped
    networks:
      - mcp-net
    ports:
      - "3001:3000"
    volumes:
      - m365-auth:/root/.local/share/m365
    environment:
      - NODE_ENV=production
    security_opt:
      - apparmor=unconfined

  # ----------------------------------------------------------
  # ha-mcp  —  Home Assistant MCP server
  # Transport: stdio via SSH
  # ----------------------------------------------------------
  ha-mcp:
    build:
      context: ./services/ha-mcp
      dockerfile: Dockerfile
    container_name: ha-mcp
    restart: unless-stopped
    networks:
      - mcp-net
    environment:
      - HOMEASSISTANT_URL=${HOMEASSISTANT_URL}
      - HOMEASSISTANT_TOKEN=${HOMEASSISTANT_TOKEN}
    security_opt:
      - apparmor=unconfined

  # ----------------------------------------------------------
  # spotify-mcp  —  Spotify playback, playlists, search
  # Transport: stdio via SSH
  # ----------------------------------------------------------
  spotify-mcp:
    build:
      context: ./services/spotify-mcp
      dockerfile: Dockerfile
    container_name: spotify-mcp
    restart: unless-stopped
    networks:
      - mcp-net
    volumes:
      - ./services/spotify-mcp/config/spotify-config.json:/app/spotify-config.json
    security_opt:
      - apparmor=unconfined

  # ----------------------------------------------------------
  # traefik  —  Reverse proxy / TLS termination for *.superg.co
  # Certs via Let's Encrypt + Cloudflare DNS challenge
  # ----------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    networks:
      - mcp-net
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-acme:/etc/traefik
    security_opt:
      - apparmor=unconfined
    labels:
      - "traefik.enable=true"

volumes:
  m365-auth:
  traefik-acme:
